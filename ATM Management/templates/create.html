<html>
    <head>
        <title>URL_FOR</title>
		<link rel="stylesheet" href="/static/custom.css">
    </head>
    <body>
        <form action="{{url_for('CollectInfo')}}">
		<table id="tblinput">
		
			<label id="lblusername="lbluser">Username or Email</label><br>
            <input type="text" id="txtname" name="txtname" required autofocus></input>
			<br>
			<br>
			
			<label id="lblpassword="lbluser">Password</label><br>
            <input type="text" id="txtpassword" name="txtpassword" required autofocus></input>
			<br>
			<br>
			
			<button type="submit" id="btnsubmit" name="btnsubmit">SUBMIT</button>
			
            <button type="reset" id="btnclear" name="btnclear">CLEAR</button>
			
		</table>
		</form>
    </body>
</html>
