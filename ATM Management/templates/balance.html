<html>
    <head>
        <title>View Balance</title>
        <link rel="stylesheet" href="/static/custom.css">
    </head>
    <body>
        <h2>View Balance</h2>

        <form method="POST" action="{{url_for('BalanceOutput')}}">
            <table id="tblinput">
                <div class="square">

                    <label name="lblpin">Enter PIN:</label><br>
                    <input type="password" name="txtpin" id="txtpin" required autofocus></input>
                    <br><br>

                    {% if balance %}
                        <label name="lblbalance">Current Balance: ${{balance}}</label>
                        <br><br>
                    {% endif %}

                    <button type="submit">Check Balance</button>
                    <a href="{{url_for('index')}}"><button type="button">Go Back</button></a>

                </div>
            </table>
        </form>
    </body>
</html>
